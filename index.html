<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OmniRouteTray</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <main id="app">
      <header class="popover-header">
        <span class="status-dot" data-state="unknown"></span>
        <span class="title">OmniRoute</span>
        <span class="state-label" id="state-label">Starting…</span>
        <span class="version" id="version"></span>
      </header>
      <section id="content" class="popover-content">
        <div id="error" class="section"></div>
        <div id="statusband" class="section"></div>
        <div id="ratelimits" class="section"></div>
        <div id="cost" class="section"></div>
        <div id="trend" class="section"></div>
        <div id="update" class="section"></div>
      </section>
      <footer class="footer">
        <span id="app-version" class="app-version"></span>
        <span class="footer-actions">
          <button id="refresh-btn" class="icon-btn" title="Refresh data"></button>
          <button id="help-btn" class="icon-btn" title="View on GitHub"></button>
          <button id="gear-btn" class="icon-btn" title="Settings"></button>
        </span>
      </footer>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
