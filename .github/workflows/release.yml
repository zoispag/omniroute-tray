name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Install frontend deps
        run: npm ci

      - name: Fetch bundled Node runtime
        run: bash scripts/fetch-node.sh
        env:
          NODE_VERSION: v26.4.0

      - name: Build app (Developer ID if configured, else ad-hoc)
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY || '-' }}
        run: npm run tauri build -- --bundles app,dmg

      - name: Verify signature
        run: |
          APP="src-tauri/target/release/bundle/macos/OmniRouteTray.app"
          codesign --verify --deep --strict --verbose=2 "$APP"

      - name: Notarize and staple (only with Apple credentials)
        if: env.APPLE_ID != ''
        run: |
          DMG=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" | head -1)
          xcrun notarytool submit "$DMG" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "$DMG"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: OmniRouteTray-macos
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: src-tauri/target/release/bundle/dmg/*.dmg

      - name: Generate tap token
        id: tap_token
        if: startsWith(github.ref, 'refs/tags/') && vars.TAP_APP_ID != ''
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.TAP_APP_ID }}
          private-key: ${{ secrets.TAP_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: homebrew-tap

      - name: Update Homebrew Cask
        if: steps.tap_token.outputs.token != ''
        env:
          TAP_TOKEN: ${{ steps.tap_token.outputs.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DMG=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" | head -1)
          SHA=$(shasum -a 256 "$DMG" | awk '{print $1}')
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/${GITHUB_REPOSITORY_OWNER}/homebrew-tap.git" tap
          sed -e "s/{{VERSION}}/${VERSION}/" -e "s/{{SHA256}}/${SHA}/" \
            .github/cask.rb.tmpl > tap/Casks/omniroute-tray.rb
          cd tap
          git config user.name "omniroute-tray[bot]"
          git config user.email "omniroute-tray[bot]@users.noreply.github.com"
          git add Casks/omniroute-tray.rb
          git commit -m "omniroute-tray ${VERSION}" || exit 0
          git push
